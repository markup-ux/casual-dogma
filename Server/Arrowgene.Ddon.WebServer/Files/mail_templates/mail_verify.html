<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-16">
        <title>Welcome Arisen!</title>

        <style>
            body {
                margin: 0;
                padding: 0;
                background-color: #f4f4f4;
                font-family: Arial, Helvetica, sans-serif;
            }

            .wrapper {
                width: 100%;
                background-color: #f4f4f4;
            }

            .container {
                width: 600px;
                max-width: 600px;
                background-color: #1e1e1e;
                padding: 30px;
            }

            .header {
                text-align: center;
                padding-bottom: 30px;
            }

            .header img {
                max-width: 250px;
                width: 100%;
                height: auto;
                display: block;
                margin: 0 auto;
            }

            .content {
                color: #999999;
                font-size: 16px;
                line-height: 1.6;
            }

            .content a {
                color: #b5b194;
                text-decoration: none;
                font-weight: bold;
            }

            .footer {
                text-align: center;
                padding-top: 40px;
                font-size: 12px;
                color: #999999;
            }

            .footer a {
                text-decoration: none;
                color: #999999;
            }

            .footer svg {
                vertical-align: middle;
            }
        </style>
    </head>

    <body>
        <table class="wrapper" cellpadding="0" cellspacing="0">
            <tr>
                <td align="center">
                    <table class="container" cellpadding="0" cellspacing="0">
                        <tr>
                            <td class="header">
                                <img src="{{LogoLink}}" alt="Logo">
                                <hr style="width:inherit;color: #b5b194;"/>
                            </td>
                        </tr>
                        <tr>
                            <td class="content">
                                <p>
                                    Hello and welcome <strong>{{UserName}}</strong>!
                                </p>
                                <p>
                                    To continue with your email verification, please,
                                    <a href="{{Schema}}://{{VerificationLink}}">
                                        click here
                                    </a>
                                    .
                                    <br>
                                    Note that without this your e-mail will not be updated.
                                </p>
                                <p>
                                    Get ready Arisen, to battle!!
                                </p>
                            </td>
                        </tr>
                        <tr>
                            <td class="footer">
                                <hr style="width:inherit;color: #b5b194;"/>

                                <p>
                                    {{Year}} - WDT Team
                                    &nbsp;|&nbsp;
                                    <a href="{{Schema}}://{{DomainUrl}}" target="_blank">
                                        <svg xmlns="http://www.w3.org/2000/svg"
                                             width="14" height="14"
                                             viewBox="0 0 24 24"
                                             fill="none"
                                             stroke="currentColor"
                                             stroke-width="2"
                                             stroke-linecap="round"
                                             stroke-linejoin="round">
                                            <circle cx="12" cy="12" r="10"></circle>
                                            <line x1="2" y1="12" x2="22" y2="12"></line>
                                            <path d="M12 2a15.3 15.3 0 0 1 0 20a15.3 15.3 0 0 1 0-20"></path>
                                        </svg>
                                    </a>
                                </p>
                            </td>
                        </tr>
                    </table>
                </td>
            </tr>
        </table>
    </body>
</html>
