<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Reset Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 400px;
        }

        .field {
            margin-bottom: 10px;
        }

        .label {
            font-weight: bold;
        }

        #response_area {
            margin-top: 15px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="field">
            <label class="label">Account ID:</label>
            <input id="input_account" type="password">
        </div>
        <div class="field">
            <label class="label">New Password:</label>
            <input id="input_password" type="password">
        </div>

        <div class="field">
            <label class="label">Confirm Password:</label>
            <input id="input_confirm_password" type="password">
        </div>

        <div class="field">
            <button id="button_submit" type="button">Change Password</button>
        </div>
    </div>

    <div id="response_area">
        <div><span class="label">Error:</span> <span id="resp_error"></span></div>
        <div><span class="label">Message:</span> <span id="resp_message"></span></div>
    </div>

    <script>
        (function () {
            window.DDON = {
                API_ACCOUNT: "/api/account",
                PasswordToken: "",

                setup: function () {
                    DDON.PasswordToken = DDON.getTokenFromUrl();
                    DDON.addClick("button_submit", DDON.submitReset);
                },

                getTokenFromUrl: function () {
                    return new URLSearchParams(window.location.search).get("token");
                },

                submitReset: function () {
                    const account = DDON.getText("input_account");
                    const password = DDON.getText("input_password");
                    const confirmPassword = DDON.getText("input_confirm_password");

                    if (password !== confirmPassword) {
                        DDON.showResponse({
                            Error: "Passwords don't match.",
                            Message: null,
                            Token: null
                        });
                        return;
                    }
                    if (account == "") {
                        DDON.showResponse({
                            Error: "Account cannot be empty.",
                            Message: null,
                            Token: null
                        });
                        return;
                    }

                    DDON.post(DDON.API_ACCOUNT, {
                        Action: "reset",
                        Account: account,
                        Password: password,
                        PasswordToken: DDON.PasswordToken
                    }, DDON.showResponse);
                },

                showResponse: function (data) {
                    document.getElementById("resp_error").textContent = data.Error;
                    document.getElementById("resp_message").textContent = data.Message;
                },

                post: function (url, data, cb) {
                    fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(data)
                    })
                        .then(r => r.json())
                        .then(cb);
                },

                addClick: function (id, cb) {
                    document.getElementById(id).onclick = cb;
                },

                getText: function (id) {
                    return document.getElementById(id).value;
                }
            };

            DDON.setup();
        })();
    </script>

</body>
</html>
